<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticketing System - Login / Signup</title>
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/login.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Ticketing System</div>
      <nav class="nav">
        <a href="dashboard.html" class="nav__link">Dashboard</a>
        <a href="write.html" class="nav__link">Write</a>
        <a href="account.html" class="nav__link">Account</a>
        <a href="login.html" class="nav__link nav__link--active nav__link--cta"
          >Login / Signup</a
        >
      </nav>
    </header>

    <main class="page page--login">
      <section class="panel panel--split">
        <div class="panel__side">
          <h1>Login</h1>
          <p>Already have an account? Sign in to continue.</p>

          <form id="login-form" class="auth-form" action="#" method="post">
            <label>
              Email
              <input
                type="email"
                name="email"
                placeholder="you@example.com"
                required
              />
            </label>

            <label>
              Password
              <div
                style="position: relative; display: flex; align-items: center"
              >
                <input
                  type="password"
                  name="password"
                  placeholder="Enter your password"
                  required
                />
                <button
                  type="button"
                  class="toggle-password"
                  style="
                    position: absolute;
                    right: 8px;
                    background: none;
                    border: none;
                    cursor: pointer;
                    color: var(--primary);
                    font-weight: bold;
                  "
                >
                  Show
                </button>
              </div>
            </label>

            <div class="form-actions">
              <button type="submit" class="button">Login</button>
            </div>
          </form>
        </div>

        <div class="panel__side panel__side--alt">
          <h1>Signup</h1>
          <p>Create a new account to start tracking tickets immediately.</p>

          <form id="signup-form" class="auth-form" action="#" method="post">
            <label>
              Full Name
              <input type="text" name="name" placeholder="Your name" required />
            </label>

            <label>
              Email
              <input
                type="email"
                name="email"
                placeholder="you@example.com"
                required
              />
            </label>

            <label>
              Password
              <input
                type="password"
                name="password"
                placeholder="Create a password"
                required
              />
            </label>

            <div class="form-actions">
              <button type="submit" class="button">Sign Up</button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; <span id="year"></span> Ticketing System</p>
    </footer>

    <script src="login.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
