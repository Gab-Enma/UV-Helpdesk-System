<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticketing System - Registrar Dashboard</title>
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/dashboard.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Ticketing System - Registrar</div>
      <nav class="nav">
        <a href="dashboard-registrar.html" class="nav__link nav__link--active"
          >Dashboard</a
        >
        <a href="write.html" class="nav__link">Write</a>
        <a href="account.html" class="nav__link">Account</a>
        <a href="#" id="logout-btn" class="nav__link nav__link--cta">Logout</a>
      </nav>
    </header>

    <main class="page page--dashboard">
      <section class="panel">
        <h1 data-category="registrar">Registrar Dashboard</h1>
        <p>Viewing tickets assigned to Registrar.</p>

        <div class="cards">
          <div class="card">
            <h2>Open Tickets</h2>
            <p class="stat stat-open">0</p>
          </div>
          <div class="card">
            <h2>In Progress</h2>
            <p class="stat stat-progress">0</p>
          </div>
          <div class="card">
            <h2>Resolved</h2>
            <p class="stat stat-resolved">0</p>
          </div>
        </div>

        <section class="recent">
          <h2>Recent Activity</h2>
          <p class="muted">
            No activity yet. Create a ticket to see updates here.
          </p>
        </section>

        <p class="muted">
          Logged in as: <span id="account-name"></span> (<span
            id="role-name"
          ></span
          >)
        </p>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; <span id="year"></span> Ticketing System</p>
    </footer>

    <script src="dashboard-category.js"></script>
  </body>
</html>
